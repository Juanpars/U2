<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="78%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2e5fa3" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#2e5fa3" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="nodeLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f74c2" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#3f74c2" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#05070b" />
  <rect width="1200" height="320" fill="url(#glow)" />

  <!-- red de nodos, evocando "Redes Inteligentes y Ciberseguridad" —
       único acento decorativo, discreto, en la esquina superior derecha -->
  <g stroke="url(#nodeLine)" stroke-width="1">
    <line x1="860" y1="55" x2="965" y2="115" />
    <line x1="965" y1="115" x2="1075" y2="80" />
    <line x1="965" y1="115" x2="1010" y2="205" />
    <line x1="1075" y1="80" x2="1150" y2="150" />
    <line x1="1010" y1="205" x2="1115" y2="245" />
    <line x1="885" y1="215" x2="1010" y2="205" />
    <line x1="1075" y1="80" x2="1150" y2="30" />
  </g>
  <g fill="#3f74c2">
    <circle cx="860" cy="55" r="2.5" />
    <circle cx="965" cy="115" r="4" />
    <circle cx="1075" cy="80" r="3" />
    <circle cx="1010" cy="205" r="4" />
    <circle cx="1150" cy="150" r="3" />
    <circle cx="1115" cy="245" r="2.5" />
    <circle cx="885" cy="215" r="2.5" />
    <circle cx="1150" cy="30" r="2.5" />
  </g>

  <!-- borde superior, un único trazo fino como firma del sistema -->
  <rect x="0" y="0" width="1200" height="2" fill="#2e5fa3" opacity="0.35" />

  <!-- wordmark -->
  <text x="80" y="148" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#e9ecf2">
    GIR6091
  </text>
  <text x="80" y="148" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#3f74c2">
    <tspan dx="14">·</tspan>
  </text>
  <text x="80" y="194" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="20" letter-spacing="6" fill="#8b93a8">
    TASKS
  </text>

  <text x="82" y="228" font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" fill="#8b93a8">
    Gestión de tareas · Ingeniería en Redes Inteligentes y Ciberseguridad
  </text>

  <!-- leyenda de colores: crear · editar · borrar -->
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b93a8">
    <rect x="80" y="258" width="220" height="26" rx="4" fill="#0b0e15" stroke="#1a2029" />
    <circle cx="96" cy="271" r="4.5" fill="#2e5fa3" />
    <text x="108" y="275">crear</text>

    <circle cx="166" cy="271" r="4.5" fill="#2f6b4f" />
    <text x="178" y="275">editar</text>

    <circle cx="242" cy="271" r="4.5" fill="#8c2f35" />
    <text x="254" y="275">borrar</text>
  </g>
</svg>
