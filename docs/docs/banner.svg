<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#3f74c2" opacity="0.22" />
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#05070b" stop-opacity="0" />
      <stop offset="100%" stop-color="#05070b" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="nodeLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f74c2" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#3f74c2" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#05070b" />
  <rect width="1200" height="320" fill="url(#grid)" />

  <!-- red de nodos, evocando "Redes Inteligentes y Ciberseguridad" -->
  <g stroke="url(#nodeLine)" stroke-width="1">
    <line x1="880" y1="60" x2="980" y2="120" />
    <line x1="980" y1="120" x2="1080" y2="90" />
    <line x1="980" y1="120" x2="1020" y2="210" />
    <line x1="1080" y1="90" x2="1150" y2="160" />
    <line x1="1020" y1="210" x2="1120" y2="250" />
    <line x1="900" y1="220" x2="1020" y2="210" />
  </g>
  <g fill="#3f74c2">
    <circle cx="880" cy="60" r="3" />
    <circle cx="980" cy="120" r="4" />
    <circle cx="1080" cy="90" r="3" />
    <circle cx="1020" cy="210" r="4" />
    <circle cx="1150" cy="160" r="3" />
    <circle cx="1120" cy="250" r="3" />
    <circle cx="900" cy="220" r="3" />
  </g>

  <rect width="1200" height="320" fill="url(#fade)" opacity="0.0" />

  <!-- wordmark -->
  <text x="80" y="150" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#e9ecf2">
    GIR6091
  </text>
  <text x="80" y="150" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#3f74c2">
    <tspan dx="14">·</tspan>
  </text>
  <text x="80" y="196" font-family="'JetBrains Mono', 'Consolas', monospace" font-size="20" letter-spacing="6" fill="#8b93a8">
    TASKS
  </text>

  <text x="82" y="230" font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" fill="#8b93a8">
    Gestión de tareas · Ingeniería en Redes Inteligentes y Ciberseguridad
  </text>

  <!-- leyenda de colores -->
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#8b93a8">
    <circle cx="86" cy="268" r="5" fill="#2e5fa3" />
    <text x="100" y="272">crear</text>

    <circle cx="166" cy="268" r="5" fill="#2f6b4f" />
    <text x="180" y="272">editar</text>

    <circle cx="252" cy="268" r="5" fill="#8c2f35" />
    <text x="266" y="272">borrar</text>
  </g>
</svg>
